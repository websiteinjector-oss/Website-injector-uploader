<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APK Store</title>
<style>
body{font-family:Arial,sans-serif;margin:0;padding:0;background:#f0f2f5;}
.header{background:#2196f3;color:white;padding:15px;text-align:center;font-size:22px;font-weight:bold;}
.tab{display:none;padding:10px;}
.main-tabs{display:flex;background:#1976d2;}
.main-tabs button{flex:1;padding:14px;border:none;background:#1976d2;color:white;font-size:16px;cursor:pointer;}
.home-tabs{display:flex;justify-content:space-around;margin:10px 0;}
.home-tabs button{flex:1;margin:0 5px;padding:10px;border:none;border-radius:6px;background:#2196f3;color:white;cursor:pointer;}
.apk{background:white;padding:12px;margin-bottom:12px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.2);display:flex;gap:12px;align-items:center;}
.apk img{width:60px;height:60px;border-radius:10px;}
.progress-container{width:100%;background:#ddd;border-radius:5px;margin-top:5px;}
.progress-bar{width:0%;height:10px;background:#4caf50;border-radius:5px;}
button.like-btn{background:#ff4081;color:white;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;}
button.delete-btn{background:#f44336;color:white;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;}
input, textarea{width:95%;padding:8px;margin:5px 0;border-radius:5px;border:1px solid #ccc;}
</style>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="login">
<h2 style="text-align:center;">APK Store Login</h2>
<input id="user" placeholder="Username"><br>
<input type="password" id="password" placeholder="Password"><br><br>
<div id="captcha" style="font-weight:bold;font-size:18px;"></div>
<input id="capInput" placeholder="Enter CAPTCHA"><br><br>
<button onclick="login()" style="width:100%;padding:10px;background:#2196f3;color:white;border:none;border-radius:6px;cursor:pointer;">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none">
<div class="header">INJECTOR UPLOADE WEBSITE</div>

<div class="main-tabs">
<button onclick="showTab('home')">Home</button>
<button onclick="showTab('upload')">Upload</button>
<button onclick="showTab('profile')">Profile</button>
</div>

<!-- HOME -->
<div id="home" class="tab">
<input class="search" id="search" placeholder="Search APK" oninput="render()" style="margin-bottom:10px;"><br>
<div class="home-tabs">
<button onclick="switchHomeTab('latest')">Latest Upload</button>
<button onclick="switchHomeTab('top')">Most Downloaded</button>
<button onclick="switchHomeTab('my')">My Uploads</button>
</div>
<div id="latest" class="home-tab"></div>
<div id="top" class="home-tab"></div>
<div id="my" class="home-tab"></div>
</div>

<!-- UPLOAD -->
<div id="upload" class="tab">
<h2>Upload APK</h2>
<input id="name" placeholder="App Name"><br>
<textarea id="desc" placeholder="Description"></textarea><br>
<input id="apk" placeholder="MediaFire APK Link"><br><br>
<label>Choose Icon:</label>
<input type="file" id="iconFile" accept="image/*" onchange="showPreview(event)"><br>
<img id="previewIcon" style="width:100px;height:100px;border-radius:10px;margin:5px;"><br>
<button onclick="upload()" style="width:100%;padding:10px;background:#2196f3;color:white;border:none;border-radius:6px;cursor:pointer;">Upload APK</button>
</div>

<!-- PROFILE -->
<div id="profile" class="tab">
<h2>Profile</h2>
<p><b>Username:</b> <span id="profileName"></span></p>
<p><b>Privacy:</b> Everyone can see uploaded APKs</p>
<p><b>Rules:</b> Be respectful, no illegal APKs</p>
<button onclick="logout()" style="width:100%;padding:10px;background:#f44336;color:white;border:none;border-radius:6px;cursor:pointer;">Logout</button>
</div>

<script src="app.js"></script>
</body>
</html>
